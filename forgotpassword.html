<!DOCTYPE html>
<html lang="en">
<head>

<body>

<div class="container">
    <h2>Wag mo kasing kalimutan!</h2>

    <!-- <p class="sub">Enter your email to reset your password</p> -->

    <form onsubmit="resetPassword(event)">
        <input type="email" id="email" placeholder="Enter your email" required>

        <input type="password" id="newPassword" placeholder="New Password" required>

        <form onsubmit="verifySecurity(event)">

    <input type="text" id="answer" placeholder="What is your pet’s name?" required>

    <button type="submit">Reset Password</button>
</form>

    <p class="link">
        Back to <a href="index.html">Login</a>
    </p>
</div>
