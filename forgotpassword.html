<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password</title>
<link rel="icon" type="image/x-icon" href="images/cashg.png">
<link rel="stylesheet" href="css/forgotpassword.css">
</head>
<body>

<div class="container">
    <h2>Wag mo kasing kalimutan!</h2>

    <form id="resetForm">

        <input type="email" id="email" placeholder="Enter your email" required>

        <input type="text" id="securityAnswer" placeholder="What is your pet’s name?" required>

        <input type="password" id="newPassword" placeholder="New Password" required>

        <button type="submit">Reset Password</button>

    </form>

    <p class="link">
        Back to <a href="index.html">Login</a>
    </p>
</div>

<script type="module" src="js/forgotpassword.js"></script>

</body>
</html>
