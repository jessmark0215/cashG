<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Wallet Dashboard</title>

<link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

<div class="header">
    <div class="logo"><img src="images/logo.png" alt="logo"></div>
    <h2 id="userFullName"></h2>
    <button class="logout" onclick="logout()">Logout</button>
</div>

<div class="container">

    <!-- BALANCE -->
    <div class="balance-card">
        <h3>Current Balance</h3>
        <div class="balance" id="balance">₱0</div>
    </div>

    <!-- ACTIONS -->
    <div class="actions">
        <!-- <button onclick="showAdd()">Add Money</button> -->
        <button onclick="showSend()">Send Money</button>
    </div> 

    <!-- ADD MONEY -->
    <div class="form-box" id="addBox">
        <input type="number" id="addAmount" placeholder="Enter amount">
        <button onclick="addMoney()">Confirm Add</button>
    </div>

    <!-- SEND MONEY -->
    <div class="form-box" id="sendBox">
        <input type="text" id="receiver" placeholder="Receiver Name">
        <input type="number" id="sendAmount" placeholder="Amount">
        <button onclick="sendMoney()">Send</button>
    </div>

    <!-- TRANSACTIONS -->
    <div class="transactions">
        <h3>Transaction History</h3>
        <div id="history"></div>
    </div>

</div>

<script type="module" src="js/dashboard.js"></script>
</body>
</html>
